<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 300" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4af37"/>
      <stop offset="50%" stop-color="#9a7b1c"/>
      <stop offset="100%" stop-color="#b89728"/>
    </linearGradient>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#b91c1c"/>
    </linearGradient>
  </defs>

  <!-- Baroque Colonial Ornamental Shield Frame (Gold) -->
  <g transform="translate(210, 115) scale(1.15)">
    <!-- Outer Ornate Flourishes -->
    <path d="M0 -85 C-30 -85 -55 -60 -65 -30 C-85 -20 -90 0 -85 25 C-95 35 -90 55 -70 65 C-60 80 -40 90 0 95 C40 90 60 80 70 65 C90 55 95 35 85 25 C90 0 85 -20 65 -30 C55 -60 30 -85 0 -85 Z" fill="none" stroke="url(#goldGrad)" stroke-width="8" stroke-linejoin="round"/>
    
    <!-- Inner Crimson Red Shield -->
    <path d="M0 -45 C-35 -45 -48 -25 -48 10 C-48 45 -25 65 0 78 C25 65 48 45 48 10 C48 -25 35 -45 0 -45 Z" fill="url(#redGrad)" stroke="url(#goldGrad)" stroke-width="3"/>

    <!-- Green Crown / Laurel Motif above Red Shield -->
    <path d="M-28 -48 C-15 -68 0 -75 15 -68 C28 -48 20 -46 0 -52 C-20 -46 -28 -48 -28 -48 Z" fill="#16a34a"/>
    <path d="M-22 -46 L-16 -62 M-10 -48 L-6 -66 M0 -50 L0 -68 M10 -48 L6 -66 M22 -46 L16 -62" stroke="#15803d" stroke-width="2.5" stroke-linecap="round"/>

    <!-- IHS Gold Inscription inside Red Shield -->
    <text x="0" y="-12" font-family="Times New Roman, serif" font-size="18" font-weight="bold" fill="#fef08a" text-anchor="middle" letter-spacing="3">IHS</text>
    <path d="M0 -22 L0 -28 M-4 -25 L4 -25" stroke="#fef08a" stroke-width="1.5"/>

    <!-- Gold Emblem inside lower Red Shield (Colonial Armor/Fountain) -->
    <path d="M-14 35 C-10 15 -14 5 0 5 C14 5 10 15 14 35 L-14 35 Z" fill="none" stroke="#fef08a" stroke-width="2.5"/>
    <path d="M-7 35 L0 15 L7 35" fill="none" stroke="#fef08a" stroke-width="1.5"/>

    <!-- GENVINVM GENVS Banner Scroll -->
    <path d="M-68 62 C-40 78 40 78 68 62" fill="none" stroke="url(#goldGrad)" stroke-width="14" stroke-linecap="round"/>
    <text x="0" y="73" font-family="Times New Roman, serif" font-size="10" font-weight="bold" fill="#1f2937" text-anchor="middle" letter-spacing="1">GENVINVM GENVS</text>
  </g>

  <!-- Title Text Below Coat of Arms -->
  <text x="210" y="265" font-family="Impact, Arial Black, sans-serif" font-size="20" font-weight="900" fill="#1f2937" text-anchor="middle" letter-spacing="0.5">CÂMARA MUNICIPAL DE EMBU DAS ARTES/SP</text>
</svg>
