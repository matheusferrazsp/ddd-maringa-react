<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" width="100%" height="100%">
  <defs>
    <linearGradient id="maringaBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00c6ff"/>
      <stop offset="100%" stop-color="#0094ff"/>
    </linearGradient>
  </defs>

  <!-- Cyan Pill Banner -->
  <rect x="15" y="15" width="490" height="120" rx="60" fill="url(#maringaBg)" />

  <!-- Worker / Exterminator Icon with Sprayer -->
  <g fill="#ffffff">
    <!-- Head -->
    <circle cx="95" cy="52" r="10"/>
    <!-- Backpack Tank -->
    <rect x="55" y="52" width="16" height="28" rx="4" transform="rotate(-15 55 52)" opacity="0.95"/>
    <!-- Torso -->
    <path d="M 85 64 L 75 92 L 62 118 C 58 126 48 130 42 124 C 36 118 42 106 48 98 L 65 72 Z" />
    <!-- Front Leg & Back Leg -->
    <path d="M 75 92 L 60 128 C 56 136 64 142 70 136 L 82 104 L 92 136 C 94 144 106 142 104 134 L 92 92 Z" />
    <!-- Arm holding spray wand -->
    <path d="M 85 68 L 105 85 L 138 108" stroke="#ffffff" stroke-width="7" stroke-linecap="round"/>
    <!-- Spray Nozzle Cloud -->
    <path d="M 140 108 L 148 114 M 140 108 L 150 106" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Main Brand Typography -->
  <g font-family="Montserrat, Inter, Arial, sans-serif">
    <!-- MARINGÁ -->
    <text x="160" y="74" font-size="44" font-weight="900" fill="#ffffff" letter-spacing="2">MARINGÁ</text>
    <!-- DEDETIZADORA -->
    <text x="162" y="96" font-size="16" font-weight="800" fill="#ffffff" letter-spacing="6.5">DEDETIZADORA</text>
  </g>

  <!-- 5 Pests Crossed Out + Checkmark Box -->
  <g transform="translate(160, 103)">
    <!-- Pest 1: Mosquito -->
    <circle cx="15" cy="15" r="13" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.85"/>
    <path d="M7 23 L23 7" stroke="#ffffff" stroke-width="2.5"/>
    <!-- Pest 2: Cockroach -->
    <circle cx="48" cy="15" r="13" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.85"/>
    <path d="M40 23 L56 7" stroke="#ffffff" stroke-width="2.5"/>
    <!-- Pest 3: Ant -->
    <circle cx="81" cy="15" r="13" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.85"/>
    <path d="M73 23 L89 7" stroke="#ffffff" stroke-width="2.5"/>
    <!-- Pest 4: Spider -->
    <circle cx="114" cy="15" r="13" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.85"/>
    <path d="M106 23 L122 7" stroke="#ffffff" stroke-width="2.5"/>
    <!-- Pest 5: Rat/Rodent -->
    <circle cx="147" cy="15" r="13" fill="none" stroke="#ffffff" stroke-width="2.5" opacity="0.85"/>
    <path d="M139 23 L155 7" stroke="#ffffff" stroke-width="2.5"/>

    <!-- Checkbox with Checkmark -->
    <rect x="175" y="2" width="26" height="26" rx="4" fill="none" stroke="#0f172a" stroke-width="3"/>
    <path d="M181 14 L187 20 L198 6" fill="none" stroke="#ffffff" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Bottom Tagline -->
  <text x="260" y="166" font-family="Montserrat, Inter, Arial, sans-serif" font-size="18" font-weight="900" fill="#00a8ff" text-anchor="middle" letter-spacing="1">EFICIÊNCIA NO CONTROLE DE PRAGAS</text>
</svg>
